  :root {

  .star {
    position: absolute;
    border-radius: 50%;
    background: var(--gold-light);
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: var(--o); transform: scale(1.2); }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem 1.5rem;
    max-width: 480px;
    width: 100%;
  }

  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(0.8rem, 3vw, 1rem);
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.3s;
  }

  .date-display {
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    color: rgba(201,168,76,0.6);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.5s;
  }

  /* カード */
  .card-wrap {
    perspective: 1000px;
    margin: 0 auto 2rem;
    width: 200px;
    height: 340px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.7s;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.reversed .card-front { transform: rotateY(180deg) rotateZ(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    border: 1px solid rgba(201,168,76,0.3);
  }

  /* 裏面 */
  .card-back {
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px;
  }
  .card-back-pattern {
    font-size: 5rem;
    opacity: 0.15;
    animation: spin 20s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 表面 */
  .card-front {
    background: linear-gradient(160deg, #1e1530 0%, #0d0818 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 0.8rem;
    transform: rotateY(180deg);
  }

  .card-number {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    opacity: 0.7;
  }

  .card-symbol {
    font-size: 5rem;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
    animation: glow 3s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { filter: drop-shadow(0 0 10px rgba(201,168,76,0.3)); }
    to   { filter: drop-shadow(0 0 30px rgba(201,168,76,0.8)); }
  }

  .card-name-ja {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--cream);
  }
  .card-name-en {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    opacity: 0.6;
    margin-top: 0.2rem;
  }

  .reversed-badge {
    display: none;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: var(--deep);
    background: var(--gold);
    padding: 0.15rem 0.5rem;
    border-radius: 99px;
    margin-top: 0.3rem;
  }
  .card.reversed .reversed-badge { display: inline-block; }

  /* テキスト */
  .card-info {
    opacity: 0;
    transition: opacity 0.8s ease 0.5s;
    margin-bottom: 1.5rem;
  }
  .card-info.visible { opacity: 1; }

  .card-keyword {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 0.6rem;
  }

  .card-message {
    font-size: 0.82rem;
    line-height: 1.9;
    color: rgba(245,240,232,0.8);
    font-weight: 300;
  }

  /* ボタン */
  .btn-calendar {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 0.6rem 1.4rem;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    text-decoration: none;
  }
  .btn-calendar.visible {
    opacity: 1;
    transition: opacity 0.8s ease 0.8s, background 0.3s, color 0.3s;
  }
  .btn-calendar:hover {
    background: var(--gold);
    color: var(--deep);
  }

  .hint {
    margin-top: 1.2rem;
    font-size: 0.65rem;
    color: rgba(201,168,76,0.35);
    letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.9s;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1rem auto;
    opacity: 0;
    transition: opacity 0.8s ease 0.4s;
  }
  .divider.visible { opacity: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tap-hint {
    font-size: 0.65rem;
    color: rgba(201,168,76,0.4);
    letter-spacing: 0.1em;
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.9s;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="container">
  <div class="title">Today's Arcana</div>
  <div class="date-display" id="dateDisplay"></div>

  <div class="card-wrap">
    <div class="card" id="card" onclick="flipCard()">
      <div class="card-face card-back">
        <div class="card-back-pattern">☽</div>
      </div>
      <div class="card-face card-front">
        <div class="card-number" id="cardNumber"></div>
        <div class="card-symbol" id="cardSymbol"></div>
        <div>
          <div class="card-name-ja" id="cardNameJa"></div>
          <div class="card-name-en" id="cardNameEn"></div>
          <div class="reversed-badge">逆位置</div>
        </div>
      </div>
    </div>
  </div>

  <div class="tap-hint" id="tapHint">カードをタップして開く</div>

  <div class="divider" id="divider"></div>

  <div class="card-info" id="cardInfo">
    <div class="card-keyword" id="cardKeyword"></div>
    <div class="card-message" id="cardMessage"></div>
  </div>

  <a class="btn-calendar" id="calendarBtn" href="#" target="_blank">
    📅 カレンダーに記録する
  </a>

  <div class="hint">同じ日は何度開いても同じカードが出ます</div>
</div>

<script>
const ARCANA = [
  { num:"0",  nameJa:"愚者",     nameEn:"The Fool",          symbol:"🌟",
    keywords:["自由","新出発","無限の可能性"],
    normal:"何も持たずに一歩を踏み出すとき。軽やかに、恐れず、ただ前へ。",
    reversed:"衝動が先走っていないか。立ち止まって足元を確認して。" },
  { num:"I",  nameJa:"魔術師",   nameEn:"The Magician",       symbol:"⚡",
    keywords:["意志","創造","実現"],
    normal:"持っているすべての道具が揃っている。あとは意志を持って動くだけ。",
    reversed:"力を持ちながら使いあぐねている。何かを恐れていないか。" },
  { num:"II", nameJa:"女教皇",   nameEn:"The High Priestess", symbol:"🌙",
    keywords:["直観","内なる知恵","神秘"],
    normal:"内側の声に耳を澄ませて。答えはすでにあなたの中にある。",
    reversed:"内に閉じすぎている。知恵を外へ少し向けてみて。" },
  { num:"III",nameJa:"女帝",     nameEn:"The Empress",        symbol:"🌸",
    keywords:["豊かさ","創造性","自然"],
    normal:"あなたの周囲に豊かさが育ちつつある。受け取ることも大切に。",
    reversed:"与えすぎて疲れていないか。自分自身も大切に。" },
  { num:"IV", nameJa:"皇帝",     nameEn:"The Emperor",        symbol:"🏛️",
    keywords:["秩序","基盤","安定"],
    normal:"しっかりとした基盤が今日の行動を支えてくれる。",
    reversed:"コントロールしすぎていないか。少し手放す勇気を。" },
  { num:"V",  nameJa:"法王",     nameEn:"The Hierophant",     symbol:"🔑",
    keywords:["伝統","教え","信念"],
    normal:"誰かの言葉や教えの中に、今日のヒントがある。",
    reversed:"慣習に縛られすぎていないか。自分の価値観を信じて。" },
  { num:"VI", nameJa:"恋人",     nameEn:"The Lovers",         symbol:"💫",
    keywords:["選択","調和","つながり"],
    normal:"大切な選択の日。心が向く方向を信じて。",
    reversed:"迷いがある。焦らず、自分の気持ちを整理する時間を。" },
  { num:"VII",nameJa:"戦車",     nameEn:"The Chariot",        symbol:"🌊",
    keywords:["意志","前進","克服"],
    normal:"相反する力を一つにまとめ、前へ進む日。",
    reversed:"力が分散している。一点に集中してみて。" },
  { num:"VIII",nameJa:"力",      nameEn:"Strength",           symbol:"🦁",
    keywords:["忍耐","優しい強さ","勇気"],
    normal:"力ではなく、穏やかさで困難と向き合えるとき。",
    reversed:"無理をしていないか。優しさを自分自身にも向けて。" },
  { num:"IX", nameJa:"隠者",     nameEn:"The Hermit",         symbol:"🕯️",
    keywords:["内省","孤独","知恵の光"],
    normal:"ひとりで静かに考える時間が、大切な気づきをもたらす。",
    reversed:"孤立になっていないか。ランタンを少し外に向けてみて。" },
  { num:"X",  nameJa:"運命の輪", nameEn:"Wheel of Fortune",   symbol:"☯️",
    keywords:["転換","循環","流れ"],
    normal:"流れが変わろうとしている。波に乗る準備を。",
    reversed:"流れに抵抗している。手放すことで動きが出てくる。" },
  { num:"XI", nameJa:"正義",     nameEn:"Justice",            symbol:"⚖️",
    keywords:["公正","均衡","誠実"],
    normal:"誠実さが今日の羅針盤。正直に、公平に。",
    reversed:"自分に対して厳しすぎていないか。バランスを見直して。" },
  { num:"XII",nameJa:"吊られた男",nameEn:"The Hanged Man",    symbol:"🌿",
    keywords:["停止","新視点","手放し"],
    normal:"今は動かず、違う角度から見る時。逆さからの景色に意味がある。",
    reversed:"ぶら下がりすぎている。そろそろ降りる頃かも。" },
  { num:"XIII",nameJa:"死神",    nameEn:"Death",              symbol:"🍂",
    keywords:["変容","終わりと始まり","再生"],
    normal:"何かが終わり、新しいものが生まれようとしている。恐れずに。",
    reversed:"変化に抵抗している。執着を少し手放してみて。" },
  { num:"XIV",nameJa:"節制",     nameEn:"Temperance",         symbol:"✨",
    keywords:["調和","バランス","統合"],
    normal:"焦らず、少しずつ混ぜ合わせて。バランスの中に答えがある。",
    reversed:"極端に偏っていないか。中道を探してみて。" },
  { num:"XV", nameJa:"悪魔",     nameEn:"The Devil",          symbol:"🔗",
    keywords:["執着","束縛","影"],
    normal:"何かに縛られていると感じるなら、実は鎖は外せるかもしれない。",
    reversed:"少しずつ自由になっている。焦らなくていい。" },
  { num:"XVI",nameJa:"塔",       nameEn:"The Tower",          symbol:"⚡",
    keywords:["崩壊","覚醒","解放"],
    normal:"突然の変化も、不要なものを取り除いてくれる雷かもしれない。",
    reversed:"内側で静かに何かが変わっている。急かさなくていい。" },
  { num:"XVII",nameJa:"星",      nameEn:"The Star",           symbol:"⭐",
    keywords:["希望","癒し","導き"],
    normal:"嵐のあとの星空。光は確かにそこにある。",
    reversed:"希望が見えにくい日。でも星は曇りの向こうにある。" },
  { num:"XVIII",nameJa:"月",     nameEn:"The Moon",           symbol:"🌕",
    keywords:["幻想","不安","無意識"],
    normal:"見えているものが全てではない。直観を信じ、慎重に。",
    reversed:"不安の霧が晴れてきた。少しずつ輪郭が見えてくる。" },
  { num:"XIX",nameJa:"太陽",     nameEn:"The Sun",            symbol:"☀️",
    keywords:["喜び","活力","成功"],
    normal:"今日は自分らしさを全開に。光の中に出ていく日。",
    reversed:"喜びが内側にこもっている。少し外へ出してみて。" },
  { num:"XX", nameJa:"審判",     nameEn:"Judgement",          symbol:"🎺",
    keywords:["覚醒","再生","呼びかけ"],
    normal:"内側から何かが呼びかけている。その声に応える時。",
    reversed:"呼びかけを無視していないか。自分の真実と向き合って。" },
  { num:"XXI",nameJa:"世界",     nameEn:"The World",          symbol:"🌍",
    keywords:["完成","統合","自由"],
    normal:"内と外がひとつになる日。あなたはすでに十分な存在。",
    reversed:"もう少しで完成する。焦らず最後の一歩を。" },
];

// 日付シード
function dateToSeed(date) {
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const d = date.getDate();
  return y * 10000 + m * 100 + d;
}
function seededRandom(seed) {
  let x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

const today = new Date();
const seed = dateToSeed(today);
const cardIndex = Math.floor(seededRandom(seed) * 22);
const isReversed = seededRandom(seed + 999) > 0.5;
const card = ARCANA[cardIndex];

// 日付表示
const dateStr = today.toLocaleDateString('ja-JP', {
  year:'numeric', month:'long', day:'numeric', weekday:'long'
});
document.getElementById('dateDisplay').textContent = dateStr;

// カード情報をセット
document.getElementById('cardNumber').textContent = cardIndex === 0 ? '0' : card.num;
document.getElementById('cardSymbol').textContent = card.symbol;
document.getElementById('cardNameJa').textContent = card.nameJa;
document.getElementById('cardNameEn').textContent = card.nameEn;
document.getElementById('cardKeyword').textContent = card.keywords.join('　/　');
document.getElementById('cardMessage').textContent = isReversed ? card.reversed : card.normal;

if (isReversed) document.getElementById('card').classList.add('reversed');

// カレンダーリンク
function buildCalendarUrl() {
  const pos = isReversed ? '（逆位置）' : '（正位置）';
  const title = encodeURIComponent(`🃏 今日のアルカナ：${card.nameJa}${pos}`);
  const msg = isReversed ? card.reversed : card.normal;
  const detail = encodeURIComponent(`${card.nameJa} ${card.nameEn}\nキーワード：${card.keywords.join('・')}\n\n${msg}`);
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,'0');
  const d = String(today.getDate()).padStart(2,'0');
  const dateParam = `${y}${m}${d}`;
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateParam}/${dateParam}&details=${detail}&allday=true`;
}
document.getElementById('calendarBtn').href = buildCalendarUrl();

// フリップ
let flipped = false;
function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('tapHint').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('divider').classList.add('visible');
    document.getElementById('cardInfo').classList.add('visible');
    document.getElementById('calendarBtn').classList.add('visible');
  }, 800);
}

// 星を生成
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${(Math.random()*4+2).toFixed(1)}s;
    --o:${(Math.random()*0.6+0.2).toFixed(2)};
    animation-delay:${(Math.random()*5).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}
</script>
</body>
</html>
