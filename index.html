<style>
  :root {
    --ink: #1a1020;
    --gold: #c9a84c;
    --gold-light: #e8d08a;
    --cream: #f5f0e8;
    --deep: #0d0818;
    --mist: rgba(201,168,76,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep);
    color: var(--cream);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* 背景の星 */
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: var(--gold-light);
    animation: twinkle var(--d) ease-in-out infinite alternate;
    opacity: 0;
  }
  @keyframes twinkle {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: var(--o); transform: scale(1.2); }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 2rem 1.5rem;
    max-width: 480px;
    width: 100%;
  }

  .title {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(0.8rem, 3vw, 1rem);
    letter-spacing: 0.3em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 0.4rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.3s;
  }

  .date-display {
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    color: rgba(201,168,76,0.6);
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.5s;
  }

  /* カード */
  .card-wrap {
    perspective: 1000px;
    margin: 0 auto 2rem;
    width: 200px;
    height: 340px;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.7s;
  }

  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.4,0,0.2,1);
    cursor: pointer;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card.reversed .card-front { transform: rotateY(180deg) rotateZ(180deg); }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    border: 1px solid rgba(201,168,76,0.3);
  }

  /* 裏面 */
  .card-back {
    background: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 8px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px;
  }
  .card-back-pattern {
    font-size: 5rem;
    opacity: 0.15;
    animation: spin 20s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* 表面 */
  .card-front {
    background: linear-gradient(160deg, #1e1530 0%, #0d0818 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 0.8rem;
    transform: rotateY(180deg);
  }

  .card-number {
    font-family: 'Cinzel Decorative', serif;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    opacity: 0.7;
  }

  .card-symbol {
    font-size: 5rem;
    line-height: 1;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.5));
    animation: glow 3s ease-in-out infinite alternate;
  }
  @keyframes glow {
    from { filter: drop-shadow(0 0 10px rgba(201,168,76,0.3)); }
    to   { filter: drop-shadow(0 0 30px rgba(201,168,76,0.8)); }
  }

  .card-name-ja {
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--cream);
  }
  .card-name-en {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    opacity: 0.6;
    margin-top: 0.2rem;
  }

  .reversed-badge {
    display: none;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: var(--deep);
    background: var(--gold);
    padding: 0.15rem 0.5rem;
    border-radius: 99px;
    margin-top: 0.3rem;
  }
  .card.reversed .reversed-badge { display: inline-block; }

  /* テキスト */
  .card-info {
    opacity: 0;
    transition: opacity 0.8s ease 0.5s;
    margin-bottom: 1.5rem;
  }
  .card-info.visible { opacity: 1; }

  .card-keyword {
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 0.6rem;
  }

  .card-message {
    font-size: 0.82rem;
    line-height: 1.9;
    color: rgba(245,240,232,0.8);
    font-weight: 300;
  }

  /* ボタン */
  .btn-calendar {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Serif JP', serif;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    padding: 0.6rem 1.4rem;
    border-radius: 99px;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    text-decoration: none;
  }
  .btn-calendar.visible {
    opacity: 1;
    transition: opacity 0.8s ease 0.8s, background 0.3s, color 0.3s;
  }
  .btn-calendar:hover {
    background: var(--gold);
    color: var(--deep);
  }

  .hint {
    margin-top: 1.2rem;
    font-size: 0.65rem;
    color: rgba(201,168,76,0.35);
    letter-spacing: 0.1em;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.9s;
  }

  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 1rem auto;
    opacity: 0;
    transition: opacity 0.8s ease 0.4s;
  }
  .divider.visible { opacity: 1; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .tap-hint {
    font-size: 0.65rem;
    color: rgba(201,168,76,0.4);
    letter-spacing: 0.1em;
    margin-top: 0.5rem;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.9s;
  }
</style>
</head>

// 日付シード
function dateToSeed(date) {
  const y = date.getFullYear();
  const m = date.getMonth() + 1;
  const d = date.getDate();
  return y * 10000 + m * 100 + d;
}
function seededRandom(seed) {
  let x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}

const today = new Date();
const seed = dateToSeed(today);
const cardIndex = Math.floor(seededRandom(seed) * 22);
const isReversed = seededRandom(seed + 999) > 0.5;
const card = ARCANA[cardIndex];

// 日付表示
const dateStr = today.toLocaleDateString('ja-JP', {
  year:'numeric', month:'long', day:'numeric', weekday:'long'
});
document.getElementById('dateDisplay').textContent = dateStr;

// カード情報をセット
document.getElementById('cardNumber').textContent = cardIndex === 0 ? '0' : card.num;
document.getElementById('cardSymbol').textContent = card.symbol;
document.getElementById('cardNameJa').textContent = card.nameJa;
document.getElementById('cardNameEn').textContent = card.nameEn;
document.getElementById('cardKeyword').textContent = card.keywords.join('　/　');
document.getElementById('cardMessage').textContent = isReversed ? card.reversed : card.normal;

if (isReversed) document.getElementById('card').classList.add('reversed');

// カレンダーリンク
function buildCalendarUrl() {
  const pos = isReversed ? '（逆位置）' : '（正位置）';
  const title = encodeURIComponent(`🃏 今日のアルカナ：${card.nameJa}${pos}`);
  const msg = isReversed ? card.reversed : card.normal;
  const detail = encodeURIComponent(`${card.nameJa} ${card.nameEn}\nキーワード：${card.keywords.join('・')}\n\n${msg}`);
  const y = today.getFullYear();
  const m = String(today.getMonth()+1).padStart(2,'0');
  const d = String(today.getDate()).padStart(2,'0');
  const dateParam = `${y}${m}${d}`;
  return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${title}&dates=${dateParam}/${dateParam}&details=${detail}&allday=true`;
}
document.getElementById('calendarBtn').href = buildCalendarUrl();

// フリップ
let flipped = false;
function flipCard() {
  if (flipped) return;
  flipped = true;
  document.getElementById('card').classList.add('flipped');
  document.getElementById('tapHint').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('divider').classList.add('visible');
    document.getElementById('cardInfo').classList.add('visible');
    document.getElementById('calendarBtn').classList.add('visible');
  }, 800);
}

// 星を生成
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = Math.random() * 2.5 + 0.5;
  s.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%;
    top:${Math.random()*100}%;
    --d:${(Math.random()*4+2).toFixed(1)}s;
    --o:${(Math.random()*0.6+0.2).toFixed(2)};
    animation-delay:${(Math.random()*5).toFixed(1)}s;
  `;
  starsEl.appendChild(s);
}
</script>
